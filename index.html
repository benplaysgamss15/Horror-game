<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Override: Sector 4</title>
    <style>
        body {
            background: #050505;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 50px 20px 20px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        #hull-display {
            position: fixed;
            top: 15px;
            right: 20px;
            color: red;
            font-weight: bold;
            background: rgba(5, 5, 5, 0.9);
            padding: 5px;
            border-radius: 3px;
        }
        #output {
            white-space: pre-wrap;
            margin-bottom: 10px;
            flex-grow: 1;
            overflow-y: auto;
            word-wrap: break-word;
        }
        #input-area {
            display: flex;
            align-items: center;
            padding-bottom: 10px;
        }
        input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            width: 100%;
            margin-left: 10px;
        }
        .glitch {
            animation: shake 0.1s infinite;
            filter: invert(100%);
        }
        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(1px, 2px); }
        }
        @media (max-width: 600px) {
            #hull-display {
                top: 10px;
                right: 10px;
                font-size: 14px;
            }
            body {
                padding-top: 45px;
                padding-left: 15px;
                padding-right: 15px;
            }
        }
    </style>
</head>
<body>

    <div id="hull-display">HULL INTEGRITY: 100%</div>
    <div id="output"></div>
    <div id="input-area">
        <span>></span>
        <input type="text" id="cmd" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" autofocus>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('cmd');
        const hullDisplay = document.getElementById('hull-display');

        const gameState = {
            hullIntegrity: 100,
            hasKey: false,
            gameOver: false,
            logsRead: 0
        };

        let isTyping = false; // Prevents command spam without closing mobile keyboard

        // Tap to focus ensures keyboard stays active
        document.addEventListener('click', () => {
            if (!gameState.gameOver) input.focus();
        });

        // Slow-Typing Trick
        async function printText(text, speed = 30) {
            isTyping = true;
            const span = document.createElement('span');
            output.appendChild(span);
            
            for (let char of text) {
                span.textContent += char; // fixed bug: textContent avoids breaking HTML
                output.scrollTop = output.scrollHeight;
                await new Promise(r => setTimeout(r, speed));
            }
            
            output.appendChild(document.createElement('br')); // fixed bug: safe appending
            if (!gameState.gameOver) isTyping = false;
        }

        const openingText = "SYSTEM INITIALIZED...\nCONNECTION ESTABLISHED: FACILITY_4_SUBMERGED\n...\nWARNING: UNSTABLE UPLINK DETECTED.\n\n\"Hello? Is this the new guy? Look, I don't have much time. The main door to the control room is jammed. The sensors are picking up heavy, wet dragging sounds in the ventilation shafts. Don't look at the cameras—just listen to me. I've left the access codes in the system logs. Get me out, or the pressure valves are going to blow.\"\n\nTYPE 'HELP' FOR COMMAND LIST.\n";
        printText(openingText, 25);

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== '') {
                if (isTyping) return; // Ignore Enter if system is currently talking
                
                const command = input.value.trim().toUpperCase();
                input.value = '';
                
                // Instantly echo player's command to the screen safely
                const cmdSpan = document.createElement('span');
                cmdSpan.textContent = `> ${command}`;
                output.appendChild(cmdSpan);
                output.appendChild(document.createElement('br'));
                output.scrollTop = output.scrollHeight;

                handleInput(command);
            }
        });

        function handleInput(command) {
            if (command === "HELP") {
                printText("AVAILABLE: LIST_LOGS, READ [FILE], UNLOCK_DOOR\n");
            } 
            else if (command === "LIST_LOGS") {
                printText("FILES FOUND:\n- log_01.txt\n- log_02.txt\n");
            } 
            else if (command.startsWith("READ ")) {
                gameState.logsRead++;
                
                if (gameState.logsRead > 2) {
                    document.body.classList.add('glitch');
                    output.innerHTML = ''; 
                    printText("I  T O L D  Y O U  T O  H U R R Y .  T H E Y  A R E  H E R E .\n", 150);
                    setTimeout(() => document.body.classList.remove('glitch'), 1500);
                } 
                else if (command === "READ LOG_01.TXT" || command === "READ LOG_01") {
                    printText("LOG_01: The sounds are right outside the door now. Wet breathing. I locked the system down.\n");
                } 
                else if (command === "READ LOG_02.TXT" || command === "READ LOG_02") {
                    printText("LOG_02: I'm attaching the override credentials to this file. Access granted to Terminal.\n");
                    gameState.hasKey = true;
                } 
                else {
                    printText("FILE NOT FOUND.\n");
                }
            } 
            else if (command === "UNLOCK_DOOR") {
                if (gameState.hasKey) {
                    winGame();
                } else {
                    printText("ACCESS DENIED. REQUIRED KEY MISSING IN MEMORY.\n");
                }
            } 
            else {
                printText("COMMAND NOT RECOGNIZED... OR ACCESS DENIED.\n");
            }
        }

        function winGame() {
            gameState.gameOver = true;
            printText("OVERRIDE ACCEPTED. DOOR UNLOCKED.\n\n\"Oh thank god, the door is open! Wait... what is that in the hallway? NO—\"\n\n...CONNECTION TERMINATED...", 50);
            input.blur(); // Hides keyboard on game over
            input.disabled = true;
        }

        const hullInterval = setInterval(() => {
            if (gameState.gameOver) return clearInterval(hullInterval);
            
            gameState.hullIntegrity--;
            hullDisplay.innerText = `HULL INTEGRITY: ${gameState.hullIntegrity}%`;
            
            if (gameState.hullIntegrity <= 0) {
                gameState.gameOver = true;
                document.body.classList.add('glitch');
                printText("\nCRITICAL PRESSURE FAILURE. FACILITY CRUSHED. SIGNAL LOST.", 50);
                input.blur();
                input.disabled = true;
            }
        }, 1200);

        setInterval(() => {
            if (!gameState.gameOver) {
                document.body.classList.add('glitch');
                setTimeout(() => document.body.classList.remove('glitch'), 150);
            }
        }, 30000);

    </script>
</body>
</html>
